<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decision Matrix PWA</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>

  <style>
    :root {
      --bg: #121416; --fg: #EDEAE2;
      --q-do: #93B07A; --q-decide: #548EBE;
      --q-delegate: #E3AC52; --q-delete: #E2876F;
    }
    body {
      margin: 0; padding: 0; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--fg);
    }
    .container {
      max-width: 800px; margin: 0 auto; padding: 20px;
    }
    header { margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px 0; }
    
    .em-add {
      display: flex; gap: 8px;
    }
    .em-add input {
      flex: 1; padding: 8px 12px; border-radius: 4px;
      border: 1px solid #2A3136; background: #1B2024; color: var(--fg);
    }
    .em-add select, .em-add button {
      padding: 8px 12px; border-radius: 4px;
      border: 1px solid #2A3136; background: #1B2024; color: var(--fg);
      cursor: pointer;
    }
    .em-add button:hover { background: #2A3136; }

    .matrix-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .matrix-grid { grid-template-columns: 1fr; }
    }
    
    .quadrant {
      background: #1B2024; border-radius: 8px; padding: 16px;
      border-top: 4px solid;
      min-height: 200px;
    }
    .quadrant-do { border-color: var(--q-do); }
    .quadrant-decide { border-color: var(--q-decide); }
    .quadrant-delegate { border-color: var(--q-delegate); }
    .quadrant-delete { border-color: var(--q-delete); }
    
    .q-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .q-title { font-weight: 600; font-size: 14px; }
    .q-clear { 
      background: none; border: none; color: #6E747B; 
      font-size: 11px; cursor: pointer; padding: 0;
    }
    .q-clear:hover { color: var(--fg); }
    
    .task {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #2A3136;
    }
    .task:last-child { border-bottom: none; }
    .task-text { flex: 1; font-size: 14px; }
    .task.is-done .task-text { text-decoration: line-through; color: #6E747B; }
    
    .task-btn {
      background: none; border: none; color: #6E747B; 
      cursor: pointer; padding: 4px; border-radius: 4px;
    }
    .task-btn:hover { background: #2A3136; color: var(--fg); }

    .em-footer {
      text-align: center; color: #6E747B; font-size: 12px;
      margin-top: 40px; padding-bottom: 20px;
    }

    /* Provided CSS from plan */
    .em-authbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 10px;
    }
    .em-signin-btn {
      display: flex; align-items: center; gap: 6px;
      background: #1B2024; border: 1px solid #2A3136; border-radius: 999px;
      color: #EDEAE2; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 12px; cursor: pointer;
    }
    .em-signin-btn:hover { border-color: #3A434A; }
    .em-user { display: flex; align-items: center; gap: 7px; }
    .em-avatar { width: 20px; height: 20px; border-radius: 50%; }
    .em-user-email {
      font-size: 11px; color: #8B9198;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .em-signout-btn {
      background: none; border: none; color: #6E747B;
      font-size: 11px; font-family: 'JetBrains Mono', monospace; cursor: pointer; padding: 2px 0;
    }
    .em-signout-btn:hover { color: #EDEAE2; }
    .em-status { display: flex; align-items: center; gap: 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6E747B; }
    .em-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #6E747B; flex-shrink: 0; }
    .em-status.is-synced .em-status-dot  { background: #93B07A; }
    .em-status.is-syncing .em-status-dot { background: #E3AC52; animation: em-pulse 1s ease-in-out infinite; }
    .em-status.is-error .em-status-dot   { background: #E2876F; }
    @keyframes em-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const STORAGE_KEY = "decision_matrix_tasks";

    // ─── Firebase config ───────────────────────────────────────────────────────
    // Replace all placeholder values with your own from:
    // Firebase Console → Project settings → Your apps → Web app → SDK setup
    const FIREBASE_CONFIG = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
      projectId:         "YOUR_PROJECT_ID",
      storageBucket:     "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID",
    };

    let firebaseReady = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseReady = true;
      }
    } catch (e) {
      console.error("Firebase init failed", e);
    }
    // ───────────────────────────────────────────────────────────────────────────

    function GoogleIcon() {
      return (
        <svg width="14" height="14" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.4-6.4C35.6 2.8 30.2.5 24 .5 14.6.5 6.5 5.9 2.6 13.7l7.5 5.8C12 13.1 17.5 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.9 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.5z"/>
          <path fill="#FBBC05" d="M10.1 19.5a14.7 14.7 0 0 0 0 9l-7.5 5.8a23.9 23.9 0 0 1 0-20.6z"/>
          <path fill="#34A853" d="M24 47.5c6.2 0 11.6-2 15.4-5.6l-7.5-5.8c-2.1 1.4-4.8 2.2-7.9 2.2-6.5 0-12-4.4-13.9-10.3l-7.5 5.8C6.5 42.1 14.6 47.5 24 47.5z"/>
        </svg>
      );
    }

    function PlusIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>;
    }
    
    function XIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>;
    }

    function CycleIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>;
    }

    const QUADRANTS = [
      { id: "do", title: "Do First" },
      { id: "decide", title: "Schedule" },
      { id: "delegate", title: "Delegate" },
      { id: "delete", title: "Don't Do" }
    ];

    function nextQuadrant(current) {
      const idx = QUADRANTS.findIndex(q => q.id === current);
      return QUADRANTS[(idx + 1) % QUADRANTS.length].id;
    }

    function DecisionMatrix() {
      const [tasks, setTasks]         = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch (e) { return []; }
      });
      const [text, setText]           = useState("");
      const [picked, setPicked]       = useState("do");
      const [user, setUser]           = useState(null);
      const [syncStatus, setSyncStatus] = useState("local");
      const syncTimeout               = React.useRef(null);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
        catch (e) { console.error("localStorage save failed", e); }
      }, [tasks]);

      useEffect(() => {
        if (!firebaseReady) return;
        firebase.auth().getRedirectResult().catch((e) => console.error("redirect error", e));
        const unsub = firebase.auth().onAuthStateChanged((u) => setUser(u));
        return unsub;
      }, []);

      useEffect(() => {
        if (!firebaseReady || !user) return;
        let seeded = false;
        const ref = firebase.firestore().collection("users").doc(user.uid);
        const unsub = ref.onSnapshot(
          (snap) => {
            if (snap.exists) {
              setTasks(snap.data().tasks || []);
            } else if (!seeded) {
              ref.set({ tasks, updatedAt: Date.now() });
              seeded = true;
            }
            setSyncStatus("synced");
          },
          (err) => { console.error("Firestore sync error", err); setSyncStatus("error"); }
        );
        return unsub;
      }, [user]);

      const signIn = () => {
        if (!firebaseReady) return;
        firebase.auth().signInWithRedirect(new firebase.auth.GoogleAuthProvider());
      };
      const signOutUser = () => firebase.auth().signOut();

      const writeRemote = React.useCallback((newTasks) => {
        if (!firebaseReady || !user) return;
        setSyncStatus("syncing");
        clearTimeout(syncTimeout.current);
        syncTimeout.current = setTimeout(() => {
          firebase.firestore().collection("users").doc(user.uid)
            .set({ tasks: newTasks, updatedAt: Date.now() })
            .then(() => setSyncStatus("synced"))
            .catch((e) => { console.error("Firestore write failed", e); setSyncStatus("error"); });
        }, 500);
      }, [user]);

      const addTask = React.useCallback(() => {
        const trimmed = text.trim();
        if (!trimmed) return;
        setTasks((prev) => {
          const next = [
            { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
              text: trimmed, quadrant: picked, done: false },
            ...prev,
          ];
          writeRemote(next);
          return next;
        });
        setText("");
      }, [text, picked, writeRemote]);

      const toggleDone = (id) => setTasks((prev) => {
        const next = prev.map((t) => t.id === id ? { ...t, done: !t.done } : t);
        writeRemote(next); return next;
      });
      const removeTask = (id) => setTasks((prev) => {
        const next = prev.filter((t) => t.id !== id);
        writeRemote(next); return next;
      });
      const cycle = (id) => setTasks((prev) => {
        const next = prev.map((t) => t.id === id ? { ...t, quadrant: nextQuadrant(t.quadrant) } : t);
        writeRemote(next); return next;
      });
      const clearDone = (qid) => setTasks((prev) => {
        const next = prev.filter((t) => !(t.quadrant === qid && t.done));
        writeRemote(next); return next;
      });

      return (
        <div className="container">
          <header>
            <h1>Decision Matrix</h1>
            <div className="em-add">
              <input 
                value={text} 
                onChange={(e) => setText(e.target.value)} 
                onKeyDown={(e) => e.key === 'Enter' && addTask()}
                placeholder="Add a new task..." 
              />
              <select value={picked} onChange={(e) => setPicked(e.target.value)}>
                {QUADRANTS.map(q => <option key={q.id} value={q.id}>{q.title}</option>)}
              </select>
              <button onClick={addTask}><PlusIcon /></button>
            </div>
            
            {firebaseReady && (
              <div className="em-authbar">
                {!user ? (
                  <button className="em-signin-btn" onClick={signIn}>
                    <GoogleIcon /> Sign in with Google to sync
                  </button>
                ) : (
                  <div className="em-user">
                    {user.photoURL && <img className="em-avatar" src={user.photoURL} alt="" />}
                    <span className="em-user-email">{user.email}</span>
                    <button className="em-signout-btn" onClick={signOutUser}>sign out</button>
                  </div>
                )}
                <div className={`em-status ${syncStatus === "synced" ? "is-synced" : syncStatus === "syncing" ? "is-syncing" : syncStatus === "error" ? "is-error" : ""}`}>
                  <span className="em-status-dot" />
                  {syncStatus === "synced" ? "synced" : syncStatus === "syncing" ? "saving…" : syncStatus === "error" ? "sync error" : "local only"}
                </div>
              </div>
            )}
          </header>

          <div className="matrix-grid">
            {QUADRANTS.map(q => (
              <div key={q.id} className={`quadrant quadrant-${q.id}`}>
                <div className="q-header">
                  <span className="q-title">{q.title}</span>
                  <button className="q-clear" onClick={() => clearDone(q.id)}>Clear done</button>
                </div>
                <div className="q-tasks">
                  {tasks.filter(t => t.quadrant === q.id).map(t => (
                    <div key={t.id} className={`task ${t.done ? 'is-done' : ''}`}>
                      <input type="checkbox" checked={t.done} onChange={() => toggleDone(t.id)} />
                      <span className="task-text">{t.text}</span>
                      <button className="task-btn" onClick={() => cycle(t.id)}><CycleIcon /></button>
                      <button className="task-btn" onClick={() => removeTask(t.id)}><XIcon /></button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <footer className="em-footer">
            {user ? `Synced to ${user.email}` : "Saved on this device"}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DecisionMatrix />);
  </script>
</body>
</html>
