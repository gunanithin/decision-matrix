<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Matrix PWA</title>

  <!-- PWA Mobile Optimization -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Decision Matrix" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#121416" />

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <!-- Google Fonts for Modern Canva UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-messaging-compat.min.js"></script>

  <style>
    :root {
      /* Canva presentation slide colors */
      --forest-green: #0d2b21;
      --beige-canvas: #ebdcb9;
      --beige-card: #fdfaf4;
      --badge-orange: #c85a17;
      --text-muted: #a2bba5;

      --q-do: #0d2b21;
      --q-decide: #0d2b21;
      --q-delegate: #0d2b21;
      --q-delete: #0d2b21;

      --fg: #1c2130;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--forest-green);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Canva Header Top Bar styling */
    .canva-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      max-width: 1200px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .bar-text {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .dot-container {
      display: flex;
      gap: 10px;
    }

    .bar-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--badge-orange);
      display: inline-block;
    }

    /* Beige Slide Canvas */
    .em-canvas {
      background-color: var(--beige-canvas);
      border-radius: 40px 40px 0 0;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px;
      box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.25);
      box-sizing: border-box;
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
    }

    .em-header {
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin: 0 0 10px 0;
      text-align: center;
      color: var(--forest-green);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* Input & Auth pill */
    .em-add {
      display: flex;
      gap: 10px;
      background: var(--forest-green);
      padding: 10px;
      border-radius: 18px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 8px 30px rgba(13, 43, 33, 0.15);
      box-sizing: border-box;
    }

    .em-add-row {
      display: flex;
      gap: 10px;
    }

    .em-add-schedule {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .em-add-schedule input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    .em-add-schedule input:focus {
      border-color: var(--badge-orange);
      background: rgba(255, 255, 255, 0.12);
    }

    .em-add input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      transition: all 0.2s ease;
      outline: none;
      box-sizing: border-box;
    }

    .em-add input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .em-add input:focus {
      border-color: var(--badge-orange);
      background: rgba(255, 255, 255, 0.12);
    }

    .em-add select {
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .em-add select option {
      background: var(--forest-green);
      color: #fff;
    }

    .em-add select:focus {
      border-color: var(--badge-orange);
    }

    .em-add button {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      background: var(--badge-orange);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .em-add button:hover {
      background: #df661b;
      transform: translateY(-1px);
    }

    .em-authbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(13, 43, 33, 0.05);
      border: 1px solid rgba(13, 43, 33, 0.1);
      border-radius: 999px;
      width: 100%;
      max-width: 700px;
      box-sizing: border-box;
    }

    .em-signin-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--forest-green);
      border: none;
      border-radius: 999px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .em-signin-btn:hover {
      background: #143e30;
      transform: translateY(-1px);
    }

    .em-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .em-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(13, 43, 33, 0.2);
    }

    .em-user-email {
      font-size: 12px;
      color: var(--forest-green);
      font-weight: 600;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .em-signout-btn {
      background: none;
      border: none;
      color: rgba(13, 43, 33, 0.6);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .em-signout-btn:hover {
      color: var(--forest-green);
      background: rgba(13, 43, 33, 0.08);
    }

    .em-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(13, 43, 33, 0.6);
      font-weight: 600;
    }

    .em-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(13, 43, 33, 0.3);
      flex-shrink: 0;
    }

    .em-status.is-synced .em-status-dot {
      background: #2e7d32;
      box-shadow: 0 0 8px rgba(46, 125, 50, 0.4);
    }

    .em-status.is-syncing .em-status-dot {
      background: var(--badge-orange);
      box-shadow: 0 0 8px rgba(200, 90, 23, 0.4);
      animation: em-pulse 1.2s ease-in-out infinite;
    }

    .em-status.is-error .em-status-dot {
      background: #c62828;
      box-shadow: 0 0 8px rgba(198, 40, 40, 0.4);
    }

    @keyframes em-pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.35;
        transform: scale(0.85);
      }
    }

    /* Quadrant Grid Layout (4 columns side-by-side) */
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      width: 100%;
    }

    @media (max-width: 1024px) {
      .matrix-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .canva-top-bar {
        padding: 16px 20px;
      }

      .em-canvas {
        padding: 30px 16px;
        border-radius: 30px 30px 0 0;
      }

      h1 {
        font-size: 2.2rem;
      }

      .em-add {
        flex-direction: column;
        gap: 8px;
        padding: 8px;
      }

      .em-add-row {
        display: flex;
        gap: 8px;
        width: 100%;
      }

      .em-add input {
        width: 100%;
        box-sizing: border-box;
      }

      .em-add select {
        flex: 1;
        box-sizing: border-box;
      }

      .em-add-btn {
        flex: 1.2;
        justify-content: center;
        box-sizing: border-box;
      }

      .em-authbar {
        flex-direction: column;
        gap: 8px;
        border-radius: 18px;
        padding: 12px;
      }

      .em-status {
        width: 100%;
        justify-content: center;
      }

      .matrix-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .quadrant {
        min-height: auto;
      }
    }

    .quadrant {
      background-color: var(--beige-card);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(13, 43, 33, 0.05);
      border: 1px solid rgba(13, 43, 33, 0.04);
      min-height: 380px;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    }

    .quadrant:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(13, 43, 33, 0.12);
    }

    /* Card Image Banner */
    .q-image-container {
      width: 100%;
      height: 150px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      background-color: #eee;
    }

    .q-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .q-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .q-badge {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: var(--forest-green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .q-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--forest-green);
      line-height: 1.3;
    }

    .q-clear {
      background: none;
      border: none;
      color: rgba(13, 43, 33, 0.5);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .q-clear:hover {
      color: var(--forest-green);
      background: rgba(13, 43, 33, 0.05);
    }

    .q-tasks {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 250px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .q-tasks::-webkit-scrollbar {
      width: 4px;
    }

    .q-tasks::-webkit-scrollbar-track {
      background: transparent;
    }

    .q-tasks::-webkit-scrollbar-thumb {
      background: rgba(13, 43, 33, 0.15);
      border-radius: 2px;
    }

    .q-empty {
      text-align: center;
      color: rgba(13, 43, 33, 0.4);
      font-size: 12px;
      padding: 20px 0;
      font-style: italic;
    }

    /* Tasks styling */
    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fdfdfd;
      border: 1px solid #f2eedf;
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .task:hover {
      background: #fff;
      box-shadow: 0 4px 12px rgba(13, 43, 33, 0.04);
      border-color: rgba(13, 43, 33, 0.1);
    }

    /* Custom Checkbox */
    .task input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 2px solid rgba(13, 43, 33, 0.25);
      background: transparent;
      cursor: pointer;
      position: relative;
      outline: none;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .task input[type="checkbox"]:checked {
      border-color: var(--forest-green);
      background: var(--forest-green);
    }

    .task input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 1px;
      width: 4px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-text {
      flex: 1;
      font-size: 13px;
      color: #111;
      line-height: 1.4;
      font-weight: 500;
    }

    .task.is-done .task-text {
      text-decoration: line-through;
      color: rgba(13, 43, 33, 0.4);
    }

    .task-actions {
      display: flex;
      gap: 4px;
    }

    .task-btn {
      background: none;
      border: none;
      color: rgba(13, 43, 33, 0.4);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .task-btn:hover {
      background: rgba(13, 43, 33, 0.05);
      color: var(--forest-green);
    }

    .em-footer {
      text-align: center;
      color: rgba(13, 43, 33, 0.5);
      font-size: 12px;
      margin-top: auto;
      padding-top: 40px;
      padding-bottom: 20px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(13, 43, 33, 0.08);
      width: 100%;
    }

    .canva-attribution {
      font-weight: 700;
      color: var(--forest-green);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const STORAGE_KEY = "decision_matrix_tasks";

    // ─── Firebase config ───────────────────────────────────────────────────────
    // Replace all placeholder values with your own from:
    // Firebase Console → Project settings → Your apps → Web app → SDK setup
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCT2PbLfaZpVy-MBU6S97yTkTnH_oD7yNo",
      authDomain: "eisenhower-decision-matrix.firebaseapp.com",
      projectId: "eisenhower-decision-matrix",
      storageBucket: "eisenhower-decision-matrix.firebasestorage.app",
      messagingSenderId: "1011365477842",
      appId: "1:1011365477842:web:089b2170eacee611589c0b",
      measurementId: "G-G77XP9E7Z9"
    };

    let firebaseReady = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseReady = true;
      }
    } catch (e) {
      console.error("Firebase init failed", e);
    }
    // ───────────────────────────────────────────────────────────────────────────

    function GoogleIcon() {
      return (
        <svg width="14" height="14" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.4-6.4C35.6 2.8 30.2.5 24 .5 14.6.5 6.5 5.9 2.6 13.7l7.5 5.8C12 13.1 17.5 9.5 24 9.5z" />
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.9 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.5z" />
          <path fill="#FBBC05" d="M10.1 19.5a14.7 14.7 0 0 0 0 9l-7.5 5.8a23.9 23.9 0 0 1 0-20.6z" />
          <path fill="#34A853" d="M24 47.5c6.2 0 11.6-2 15.4-5.6l-7.5-5.8c-2.1 1.4-4.8 2.2-7.9 2.2-6.5 0-12-4.4-13.9-10.3l-7.5 5.8C6.5 42.1 14.6 47.5 24 47.5z" />
        </svg>
      );
    }

    function PlusIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>;
    }

    function XIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" /></svg>;
    }

    function CycleIcon() {
      return <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
    }

    const QUADRANTS = [
      {
        id: "do",
        title: "Do First: Urgent & Important",
        shortTitle: "Do First",
        image: "https://gunanithin.my.canva.site/_assets/media/34dd681b756d4ad187ef655b0376ad5e.png"
      },
      {
        id: "decide",
        title: "Schedule: Important, Not Urgent",
        shortTitle: "Schedule",
        image: "https://gunanithin.my.canva.site/_assets/media/fdc0dcd9e5f1ecc0c477f99175fc9f36.png"
      },
      {
        id: "delegate",
        title: "Delegate: Urgent, Not Important",
        shortTitle: "Delegate",
        image: "https://gunanithin.my.canva.site/_assets/media/0fe1200155f31500bcb606ef72be3589.png"
      },
      {
        id: "delete",
        title: "Don't Do: Neither Urgent Nor Important",
        shortTitle: "Don't Do",
        image: "https://gunanithin.my.canva.site/_assets/media/85b7aed970d33a415364300b038afa4e.png"
      }
    ];

    function nextQuadrant(current) {
      const idx = QUADRANTS.findIndex(q => q.id === current);
      return QUADRANTS[(idx + 1) % QUADRANTS.length].id;
    }

    function DecisionMatrix() {
      const [tasks, setTasks] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch (e) { return []; }
      });
      const [text, setText] = useState("");
      const [picked, setPicked] = useState("do");
      const [dueDate, setDueDate] = useState("");
      const [dueTime, setDueTime] = useState("");
      const [user, setUser] = useState(null);
      const [syncStatus, setSyncStatus] = useState("local");
      const syncTimeout = React.useRef(null);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
        catch (e) { console.error("localStorage save failed", e); }
      }, [tasks]);

      useEffect(() => {
        if (!firebaseReady) return;
        firebase.auth().getRedirectResult().catch((e) => console.error("redirect error", e));
        const unsub = firebase.auth().onAuthStateChanged((u) => setUser(u));
        return unsub;
      }, []);

      const VAPID_KEY = "BMKwflH9dYxByEVVgw6Xh4eD8Caj4g17LF-x0Qe6vE-CTEooIsXImL-81bBc5eu1A6HiiLZZ9A7YeyCLeaidvFw"; // Firebase Console -> Project Settings -> Cloud Messaging -> Web Push certificates

      const enablePushNotifications = React.useCallback(async () => {
        if (!firebaseReady || !user) return;
        try {
          if (!('Notification' in window)) {
            alert('Notifications are not supported on this browser.');
            return;
          }
          const perm = await Notification.requestPermission();
          if (perm === 'granted' && firebase.messaging.isSupported()) {
            const messaging = firebase.messaging();
            let swRegistration = null;
            if ('serviceWorker' in navigator) {
              swRegistration = await navigator.serviceWorker.getRegistration().catch(() => null);
            }
            const tokenOptions = {
              vapidKey: VAPID_KEY,
              ...(swRegistration ? { serviceWorkerRegistration: swRegistration } : {})
            };
            const token = await messaging.getToken(tokenOptions).catch(err => {
              console.error("FCM Token Error:", err);
              if (err.code === "messaging/missing-vapid-key" || err.message.includes("vapidKey")) {
                alert("To enable Web Push Notifications, please add your Firebase VAPID key to index.html:\n\n1. Open Firebase Console -> Project Settings -> Cloud Messaging\n2. Scroll to Web Configuration -> Generate key pair\n3. Copy the key and set VAPID_KEY in index.html");
              } else {
                alert("FCM Token Error: " + err.message);
              }
              return null;
            });
            if (token) {
              await firebase.firestore().collection("users").doc(user.uid).set({
                fcmToken: token
              }, { merge: true });
              alert("Native Push Notifications enabled!");
            }
          } else if (perm === 'denied') {
            alert("Notification permission was denied. Please unblock notifications in your browser site settings.");
          }
        } catch (err) {
          console.error("Error enabling push notifications:", err);
          alert("Error: " + err.message);
        }
      }, [user]);

      useEffect(() => {
        if (!firebaseReady || !user) return;

        // Save user profile metadata (like timezone offset and timezone name)
        const profileRef = firebase.firestore().collection("users").doc(user.uid);
        profileRef.set({
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC",
          timezoneOffset: new Date().getTimezoneOffset(),
          lastActive: Date.now()
        }, { merge: true }).catch(err => console.error("Error setting profile:", err));

        // If permission is already granted, auto-refresh FCM token
        if ('Notification' in window && Notification.permission === 'granted' && firebase.messaging.isSupported()) {
          try {
            navigator.serviceWorker.ready.then(swRegistration => {
              const messaging = firebase.messaging();
              const tokenOpts = {
                vapidKey: VAPID_KEY,
                serviceWorkerRegistration: swRegistration
              };
              messaging.getToken(tokenOpts).then((token) => {
                if (token) {
                  profileRef.set({ fcmToken: token }, { merge: true });
                }
              }).catch(e => console.log("FCM Token fetch skipped/silent:", e));
            }).catch(() => {});
          } catch (e) { }
        }

        let seeded = false;
        const unsub = profileRef.onSnapshot(
          (snap) => {
            if (snap.exists) {
              setTasks(snap.data().tasks || []);
            } else if (!seeded) {
              profileRef.set({ tasks, updatedAt: Date.now() }, { merge: true });
              seeded = true;
            }
            setSyncStatus("synced");
          },
          (err) => { console.error("Firestore sync error", err); setSyncStatus("error"); }
        );
        return unsub;
      }, [user]);

      const signIn = () => {
        if (!firebaseReady) return;
        firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())
          .then((result) => {
            setUser(result.user);
          })
          .catch((e) => console.error("popup sign-in error", e));
      };
      const signOutUser = () => firebase.auth().signOut();

      const writeRemote = React.useCallback((newTasks) => {
        if (!firebaseReady || !user) return;
        setSyncStatus("syncing");
        clearTimeout(syncTimeout.current);
        syncTimeout.current = setTimeout(() => {
          firebase.firestore().collection("users").doc(user.uid)
            .set({ tasks: newTasks, updatedAt: Date.now() })
            .then(() => setSyncStatus("synced"))
            .catch((e) => { console.error("Firestore write failed", e); setSyncStatus("error"); });
        }, 500);
      }, [user]);

      const addTask = React.useCallback(() => {
        const trimmed = text.trim();
        if (!trimmed) return;
        setTasks((prev) => {
          const newTask = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            text: trimmed,
            quadrant: picked,
            done: false,
            notificationsScheduled: {}
          };
          if (picked === "decide" || picked === "delegate") {
            if (dueDate) newTask.dueDate = dueDate;
            if (dueTime && picked === "decide") newTask.dueTime = dueTime;
          }
          const next = [newTask, ...prev];
          writeRemote(next);
          return next;
        });
        setText("");
        setDueDate("");
        setDueTime("");
      }, [text, picked, dueDate, dueTime, writeRemote]);

      const toggleDone = (id) => setTasks((prev) => {
        const next = prev.map((t) => t.id === id ? { ...t, done: !t.done } : t);
        writeRemote(next); return next;
      });
      const removeTask = (id) => setTasks((prev) => {
        const next = prev.filter((t) => t.id !== id);
        writeRemote(next); return next;
      });
      const cycle = (id) => setTasks((prev) => {
        const next = prev.map((t) => t.id === id ? { ...t, quadrant: nextQuadrant(t.quadrant) } : t);
        writeRemote(next); return next;
      });
      const clearDone = (qid) => setTasks((prev) => {
        const next = prev.filter((t) => !(t.quadrant === qid && t.done));
        writeRemote(next); return next;
      });

      return (
        <div className="app-wrapper">
          {/* Canva Presentation Top Bar */}
          <div className="canva-top-bar" style={{ justifyContent: 'center' }}>
            <div className="dot-container">
              <span className="bar-dot"></span>
              <span className="bar-dot"></span>
              <span className="bar-dot"></span>
              <span className="bar-dot"></span>
            </div>
          </div>

          {/* Canva Presentation Slide Canvas */}
          <div className="em-canvas">
            <header className="em-header">
              <h1>Decision Matrix</h1>

              {/* Task Add Form */}
              <div className="em-add" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                <input
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && addTask()}
                  placeholder="Add a new task..."
                  style={{ width: '100%' }}
                />

                {/* Conditional Date/Time Pickers for Schedule & Delegate */}
                {(picked === "decide" || picked === "delegate") && (
                  <div className="em-add-schedule">
                    <input
                      type="date"
                      value={dueDate}
                      onChange={(e) => setDueDate(e.target.value)}
                    />
                    {picked === "decide" && (
                      <input
                        type="time"
                        value={dueTime}
                        onChange={(e) => setDueTime(e.target.value)}
                      />
                    )}
                  </div>
                )}

                <div className="em-add-row" style={{ marginTop: '8px' }}>
                  <select value={picked} onChange={(e) => { setPicked(e.target.value); setDueDate(""); setDueTime(""); }}>
                    {QUADRANTS.map(q => <option key={q.id} value={q.id}>{q.shortTitle}</option>)}
                  </select>
                  <button onClick={addTask} className="em-add-btn" style={{ flex: 1 }}>
                    <PlusIcon /> Add Task
                  </button>
                </div>
              </div>

              {/* Firebase Authentication Bar */}
              {firebaseReady && (
                <div className="em-authbar">
                  {!user ? (
                    <button className="em-signin-btn" onClick={signIn}>
                      <GoogleIcon /> Sign in with Google to sync
                    </button>
                  ) : (
                    <div className="em-user">
                      {user.photoURL && <img className="em-avatar" src={user.photoURL} alt="" />}
                      <span className="em-user-email">{user.email}</span>
                      <button className="em-signout-btn" onClick={signOutUser}>sign out</button>
                      {'Notification' in window && (
                        <button className="em-signin-btn" style={{ padding: '4px 10px', fontSize: '11px', background: 'var(--badge-orange)', border: 'none' }} onClick={enablePushNotifications}>
                          {Notification.permission === 'granted' ? '🔔 Sync Alerts' : '🔔 Enable Alerts'}
                        </button>
                      )}
                    </div>
                  )}
                  <div className={`em-status ${syncStatus === "synced" ? "is-synced" : syncStatus === "syncing" ? "is-syncing" : syncStatus === "error" ? "is-error" : ""}`}>
                    <span className="em-status-dot" />
                    {syncStatus === "synced" ? "synced" : syncStatus === "syncing" ? "saving…" : syncStatus === "error" ? "sync error" : "local only"}
                  </div>
                </div>
              )}
            </header>

            {/* Matrix Grid */}
            <div className="matrix-grid">
              {QUADRANTS.map((q, index) => (
                <div key={q.id} className={`quadrant quadrant-${q.id}`}>
                  {/* Canva Quadrant Image Banner */}
                  <div className="q-image-container">
                    <img src={q.image} alt={q.title} className="q-image" />
                  </div>

                  {/* Header containing Badge & Title */}
                  <div className="q-header">
                    <div className="q-title-wrapper">
                      <span className="q-badge">{index + 1}</span>
                      <span className="q-title">{q.title}</span>
                    </div>
                    <button className="q-clear" onClick={() => clearDone(q.id)}>Clear</button>
                  </div>

                  {/* Tasks List */}
                  <div className="q-tasks">
                    {tasks.filter(t => t.quadrant === q.id).map(t => (
                      <div key={t.id} className={`task ${t.done ? 'is-done' : ''}`}>
                        <input type="checkbox" checked={t.done} onChange={() => toggleDone(t.id)} />
                        <div style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
                          <span className="task-text">{t.text}</span>
                          {(t.dueDate || t.dueTime) && (
                            <span className="task-time-badge" style={{ fontSize: '10px', color: 'rgba(13, 43, 33, 0.6)', marginTop: '4px', fontWeight: '600' }}>
                              📅 {t.dueDate} {t.dueTime ? ` ⏰ ${t.dueTime}` : ''}
                            </span>
                          )}
                        </div>
                        <div className="task-actions">
                          <button className="task-btn" title="Cycle Quadrant" onClick={() => cycle(t.id)}><CycleIcon /></button>
                          <button className="task-btn" title="Delete Task" onClick={() => removeTask(t.id)}><XIcon /></button>
                        </div>
                      </div>
                    ))}
                    {tasks.filter(t => t.quadrant === q.id).length === 0 && (
                      <div className="q-empty">No tasks in this quadrant</div>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <footer className="em-footer" style={{ justifyContent: 'center' }}>
              <div>{user ? `Synced to ${user.email}` : "Saved on this device"}</div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DecisionMatrix />);
  </script>
</body>

</html>
